name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build web + test api
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Single root lockfile across npm workspaces (apps/api, apps/web).
      - name: Install dependencies
        run: npm ci

      - name: Build web (Vite)
        run: npm run build --workspace apps/web

      # Vitest + supertest. mongodb-memory-server downloads a Mongo binary on the
      # runner the first time; cache it so reruns are fast.
      - name: Cache mongodb-memory-server binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-memory-server-${{ runner.os }}

      - name: Test api (Vitest)
        run: npm run test --workspace apps/api
