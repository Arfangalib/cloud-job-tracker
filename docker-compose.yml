services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - apps/api/.env
    environment:
      NODE_ENV: development
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/cloud-job-tracker
      CLIENT_ORIGIN: http://localhost:5173
      JWT_ACCESS_SECRET: dev_access_secret_change_me
      REFRESH_TOKEN_PEPPER: dev_refresh_pepper_change_me
    depends_on:
      - mongo
    ports:
      - "4000:4000"

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - apps/api/.env
    command: ["npm", "run", "worker"]
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://mongo:27017/cloud-job-tracker
      JWT_ACCESS_SECRET: dev_access_secret_change_me
      REFRESH_TOKEN_PEPPER: dev_refresh_pepper_change_me
    depends_on:
      - mongo

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - apps/api/.env
    environment:
      VITE_API_URL: http://localhost:4000
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  mongo-data:
